name: solver-regression

on:
  push:
  pull_request:

jobs:
  solver:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Only upV2.1/Only upV2.1/solver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node -c check-core-regressions.js
      - run: node -c audit-state-dependencies.js
      - run: npm run check:core
      - run: npm run check:key-audit
